name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only: CI only inspects code.
permissions:
  contents: read

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Lint + test JS/CSS + verify build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22' # Vite 8 needs ^20.19 || >=22.12
          cache: npm

      - run: npm ci
      - run: npm run lint:js
      - run: npm run lint:css
      - run: npm run build:assets # i18n (.mo) needs WP-CLI; the release job covers it
      - run: npm run test:js # after the build: the smoke test executes build/decider.js

      # Prove the runtime can resolve its assets, not just that Vite exited 0:
      # PHP reads build/.vite/manifest.json and loads the hashed files it names
      # (Gate.php GATE_ENTRY/STYLE_ENTRY), plus the fixed-path inlined decider.
      - name: Verify Vite build output
        run: |
          set -euo pipefail
          test -f build/.vite/manifest.json
          test -f build/decider.js
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("build/.vite/manifest.json", "utf8"));
            for (const k of ["assets/gate.js", "style.css"]) {
              if (!m[k] || !m[k].file) throw new Error("manifest missing entry " + k);
              if (!fs.existsSync("build/" + m[k].file)) throw new Error("missing built file build/" + m[k].file);
            }
            console.log("build manifest OK");
          '

  php:
    name: Lint PHP + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # PHPUnit 11 needs PHP >= 8.2, so run on 8.3. phpcs (PHPCompatibilityWP
      # testVersion 8.1-) and phpstan (phpVersion 80100) still target the 8.1 floor
      # via their own config, so this one run is authoritative.
      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      # Installs + caches dev deps; the dealerdirect installer registers WPCS so
      # .phpcs.xml.dist resolves. Must keep dev deps (the whole PHP CI lives there).
      - uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - run: composer run lint:php # phpcs (WordPress-Extra + i18n + prefix + 8.1 compat)
      - run: composer run analyze # phpstan, level max
      - run: composer test # phpunit
